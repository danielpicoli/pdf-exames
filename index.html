<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Exames PDF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0d6efd;
    }

    #dropzone {
      border: 3px dashed #0d6efd;
      padding: 45px;
      text-align: center;
      border-radius: 14px;
      background: #f8fbff;
      cursor: pointer;
      font-size: 18px;
      margin-bottom: 20px;
    }

    #dropzone:hover {
      background: #eef6ff;
    }

    .box {
      background: #f8f9fa;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.5;
      min-height: 30px;
    }

    .label {
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }

    button {
      margin-top: 10px;
      margin-right: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0d6efd;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #0b5ed7;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 20px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Leitor de Exames PDF</h1>

    <div id="dropzone">
      Arraste o PDF aqui ou clique para selecionar
    </div>

    <input type="file" id="fileInput" accept="application/pdf" style="display:none" />

    <div class="label">Resultado normal:</div>
    <div id="resultadoNormal" class="box">Aguardando PDF...</div>
    <button onclick="copiarTexto('normal')">Copiar normal</button>

    <div class="label">Resultado em caixa alta:</div>
    <div id="resultadoMaiusculo" class="box">Aguardando PDF...</div>
    <button onclick="copiarTexto('maiusculo')">Copiar caixa alta</button>

    <div class="small">
      O PDF é processado localmente no navegador. Nenhum arquivo é enviado para servidor.<br>
      Funciona melhor com PDFs que possuem texto selecionável.
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const resultadoNormal = document.getElementById("resultadoNormal");
    const resultadoMaiusculo = document.getElementById("resultadoMaiusculo");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // Ordem fixa da saída final.
    // grupo = posição do valor capturado dentro do regex.
    // decimal = true força uma casa decimal. Ex: 11.8
    // decimal = false remove casas decimais e separadores de milhar. Ex: 7.280 -> 7280
    const exames = [
      // HEMOGRAMA
      {
        abrev: "Hb",
        regex: /(\d{1,2}[.,]\d)\s*g\/dL\s*HEMOGLOBINA/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "Ht",
        regex: /(\d{1,2}[.,]\d)\s*%\s*HEMAT[ÓO]CRITO/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "Leuco",
        regex: /LEUC[ÓO]CITOS\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "Bast",
        regex: /BASTONETES\s*(\d+[.,]?\d*)\s*%/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "Seg",
        regex: /SEGMENTADOS\s*(\d+[.,]?\d*)\s*%/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "Plq",
        regex: /Plaquetas:\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },

      // ELETRÓLITOS / BIOQUÍMICA
      {
        abrev: "Na",
        regex: /S[ÓO]DIO[\s\S]*?Resultado:\s*(\d{2,3}(?:[.,]\d+)?)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "K",
        regex: /POT[ÁA]SSIO[\s\S]*?Resultado:\s*(\d{1,2}(?:[.,]\d+)?)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "Cl",
        regex: /(CLORETOS|CLORO)[\s\S]*?Resultado:\s*(\d{2,3}(?:[.,]\d+)?)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "Mg",
        regex: /MAGN[ÉE]SIO[\s\S]*?Resultado:\s*(\d{1,2}(?:[.,]\d+)?)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "Ca",
        regex: /C[ÁA]LCIO[\s\S]*?Resultado:\s*(\d{1,3}(?:[.,]\d+)?)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "P",
        regex: /F[ÓO]SFORO[\s\S]*?Resultado:\s*(\d{1,3}(?:[.,]\d+)?)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "U",
        regex: /UREIA[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "Cr",
        regex: /CREATININA[\s\S]*?Resultado:\s*(\d+[.,]\d+)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "GLI",
        regex: /(GLICEMIA|GLICOSE)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "AU",
        regex: /([ÁA]CIDO [ÚU]RICO)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      },

      // INFLAMATÓRIOS / INFECCIOSOS
      {
        abrev: "PCR",
        regex: /(PCR|PROTE[ÍI]NA C REATIVA)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      },
      {
        abrev: "PCT",
        regex: /PROCALCITONINA[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "VHS",
        regex: /(VHS|VELOCIDADE DE HEMOSSEDIMENTA[ÇC][ÃA]O)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },

      // HEPÁTICO / BILIAR
      {
        abrev: "BT",
        regex: /Bilirrubina Total\.*:\s*(\d+[.,]\d+)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "BD",
        regex: /Bilirrubina Direta\.*:\s*(\d+[.,]\d+)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "BI",
        regex: /Bilirrubina Indireta:\s*(\d+[.,]\d+)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "TGO",
        regex: /(ASPARTATO AMINOTRANSFERASE|TGO|AST)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "TGP",
        regex: /(ALANINA AMINOTRANSFERASE|TGP|ALT)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "FAL",
        regex: /FOSFATASE ALCALINA[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "GGT",
        regex: /(GAMA GLUTAMIL TRANSFERASE|GAMA GT|GGT|GAMMA GT)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "DHL",
        regex: /(DESIDROGENASE L[ÁA]TICA|DHL|LDH)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "Alb",
        regex: /ALBUMINA[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "PT",
        regex: /PROTE[ÍI]NAS TOTAIS[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: true
      },

      // PANCREÁTICO
      {
        abrev: "Amilase",
        regex: /AMILASE(?: TOTAL)?[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "Lipase",
        regex: /LIPASE[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },

      // CARDÍACOS / TROMBOSE
      {
        abrev: "Troponina",
        regex: /TROPONINA[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "CK",
        regex: /(CREATINOFOSFOQUINASE|CK TOTAL|CK)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "CKMB",
        regex: /(CKMB|CK-MB)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      },
      {
        abrev: "BNP",
        regex: /\bBNP\b[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "NTproBNP",
        regex: /(NT-PROBNP|NT PROBNP|NTproBNP)[\s\S]*?Resultado:\s*([\d.]+)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "DD",
        regex: /(D[ÍI]MERO-D|D[ÍI]MERO D)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      },

      // GASOMETRIA
      {
        abrev: "pH",
        regex: /\bpH\b\D{0,20}(\d[.,]\d{2,3})/i,
        grupo: 1,
        decimalCasas: 2
      },
      {
        abrev: "pCO2",
        regex: /\bpCO2\b\D{0,20}(-?\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "pO2",
        regex: /\bpO2\b\D{0,20}(-?\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: false
      },
      {
        abrev: "HCO3",
        regex: /(HCO3|BICARBONATO)\D{0,20}(-?\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "BE",
        regex: /(BE|BASE EXCESS|EXCESSO DE BASE)\D{0,20}(-?\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "SatO2",
        regex: /(SATO2|SATURA[ÇC][ÃA]O\s*O2|SAT\s*O2)\D{0,20}(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "Lactato",
        regex: /LACTATO[\s\S]*?(?:Resultado:)?\s*(\d+[.,]\d+)/i,
        grupo: 1,
        decimal: true
      },

      // COAGULOGRAMA
      {
        abrev: "TP",
        regex: /(TEMPO DE PROTROMBINA|\bTP\b)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "INR",
        regex: /(INR|RNI)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      },
      {
        abrev: "TTPA",
        regex: /(TTPA|KTTP|TEMPO DE TROMBOPLASTINA PARCIAL ATIVADA|APTT)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: false
      },
      {
        abrev: "Fib",
        regex: /FIBRINOG[ÊE]NIO[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: false
      },

      // ENDÓCRINO
      {
        abrev: "TSH",
        regex: /\bTSH\b[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 1,
        decimal: true
      },
      {
        abrev: "T4L",
        regex: /(T4 LIVRE|T4L)[\s\S]*?Resultado:\s*(\d+[.,]?\d*)/i,
        grupo: 2,
        decimal: true
      }
    ];

    dropzone.addEventListener("click", () => fileInput.click());

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.style.background = "#e8f0ff";
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.style.background = "#f8fbff";
    });

    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.style.background = "#f8fbff";

      const file = e.dataTransfer.files[0];
      if (file) lerPDF(file);
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) lerPDF(file);
    });

    async function lerPDF(file) {
      resultadoNormal.innerText = "Lendo PDF...";
      resultadoMaiusculo.innerText = "Lendo PDF...";

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        let textoCompleto = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          textoCompleto += await obterTextoPaginaOrdenado(page) + "
";
        }

        const normal = extrairExames(textoCompleto);

        if (!normal) {
          resultadoNormal.innerText = "Não encontrei os exames configurados.";
          resultadoMaiusculo.innerText = "Não encontrei os exames configurados.";
          return;
        }

        resultadoNormal.innerText = normal;
        resultadoMaiusculo.innerText = normal.toUpperCase();

      } catch (error) {
        resultadoNormal.innerText = "Erro ao ler o PDF.";
        resultadoMaiusculo.innerText = "Erro ao ler o PDF.";
        console.error(error);
      }
    }

    async function obterTextoPaginaOrdenado(page) {
      const content = await page.getTextContent();

      const itens = content.items
        .filter(item => item.str && item.str.trim() !== "")
        .map(item => ({
          texto: item.str.trim(),
          x: item.transform[4],
          y: Math.round(item.transform[5])
        }));

      const linhasMap = new Map();

      itens.forEach(item => {
        const yProximo = [...linhasMap.keys()].find(y => Math.abs(y - item.y) <= 3);
        const chave = yProximo !== undefined ? yProximo : item.y;

        if (!linhasMap.has(chave)) linhasMap.set(chave, []);
        linhasMap.get(chave).push(item);
      });

      const linhas = [...linhasMap.entries()]
        .sort((a, b) => b[0] - a[0])
        .map(([_, itensLinha]) =>
          itensLinha
            .sort((a, b) => a.x - b.x)
            .map(item => item.texto)
            .join(" ")
        );

      return linhas.join("
");
    }

    function extrairExames(texto) {
      let resultados = [];
      let examesEncontrados = new Set();

      exames.forEach(exame => {
        const match = texto.match(exame.regex);

        if (match && !examesEncontrados.has(exame.abrev)) {
          let valor = match[exame.grupo];
          valor = formatarValor(valor, exame);

          if (valor !== null && valor !== "NaN") {
            resultados.push(`${exame.abrev}: ${valor};`);
            examesEncontrados.add(exame.abrev);
          }
        }
      });

      return resultados.join(" ");
    }

    function formatarValor(valor, exame) {
      if (!valor) return null;

      valor = String(valor).trim();
      valor = valor.replace(",", ".");

      // Remove separador de milhar quando houver número como 2.052, 7.280, 280.000.
      if (/^\d{1,3}(\.\d{3})+$/.test(valor)) {
        valor = valor.replace(/\./g, "");
      }

      let numero = parseFloat(valor);
      if (isNaN(numero)) return null;

      if (exame.decimalCasas !== undefined) {
        return numero.toFixed(exame.decimalCasas);
      }

      if (exame.decimal) {
        return numero.toFixed(1);
      }

      return String(Math.round(numero));
    }

    function copiarTexto(tipo) {
      const texto = tipo === "normal"
        ? resultadoNormal.innerText
        : resultadoMaiusculo.innerText;

      navigator.clipboard.writeText(texto);
      alert("Resultado copiado!");
    }
  </script>
</body>
</html>
