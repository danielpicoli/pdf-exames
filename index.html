<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Exames PDF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0d6efd;
    }

    #dropzone {
      border: 3px dashed #0d6efd;
      padding: 45px;
      text-align: center;
      border-radius: 14px;
      background: #f8fbff;
      cursor: pointer;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .box {
      background: #f8f9fa;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.5;
    }

    .label {
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }

    button {
      margin-top: 10px;
      margin-right: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0d6efd;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #0b5ed7;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Leitor de Exames PDF</h1>

    <div id="dropzone">
      Arraste o PDF aqui ou clique para selecionar
    </div>

    <input type="file" id="fileInput" accept="application/pdf" style="display:none" />

    <div class="label">Resultado normal:</div>
    <div id="resultadoNormal" class="box">Aguardando PDF...</div>
    <button onclick="copiarTexto('normal')">Copiar normal</button>

    <div class="label">Resultado em caixa alta:</div>
    <div id="resultadoMaiusculo" class="box">Aguardando PDF...</div>
    <button onclick="copiarTexto('maiusculo')">Copiar caixa alta</button>

    <div class="small">
      O PDF é processado localmente no navegador. Nenhum arquivo é enviado para servidor.
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const resultadoNormal = document.getElementById("resultadoNormal");
    const resultadoMaiusculo = document.getElementById("resultadoMaiusculo");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const exames = [
      { abrev: "Hb", regex: /(hemoglobina|hb)\D{0,25}(\d{1,2}(?:[.,]\d+)?)/i, decimal: true },
      { abrev: "Ht", regex: /(hemat[oó]crito|ht)\D{0,25}(\d{1,2}(?:[.,]\d+)?)/i, decimal: true },
      { abrev: "Leuco", regex: /(leuc[oó]citos|leuco|wbc)\D{0,35}(\d{1,3}(?:[.,]\d{3})|\d{3,6})/i, decimal: false },
      { abrev: "Seg", regex: /(neutr[oó]filos|segmentados|seg)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "Bast", regex: /(bastonetes|bast)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "Plq", regex: /(plaquetas|plq|plt)\D{0,35}(\d{1,3}(?:[.,]\d{3})|\d{3,6})/i, decimal: false },

      { abrev: "Na", regex: /(s[oó]dio|na)\D{0,25}(\d{2,3}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "K", regex: /(pot[aá]ssio|k)\D{0,25}(\d{1,2}(?:[.,]\d+)?)/i, decimal: true },
      { abrev: "Cl", regex: /(cloretos|cloro|cl)\D{0,25}(\d{2,3}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "Mg", regex: /(magn[eé]sio|mg)\D{0,25}(\d{1,2}(?:[.,]\d+)?)/i, decimal: true },

      { abrev: "U", regex: /(ureia|ur[eé]ia)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "Cr", regex: /(creatinina|creat|cr)\D{0,25}(\d{1,2}(?:[.,]\d+)?)/i, decimal: true },

      { abrev: "BT", regex: /(bilirrubina total|bt)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: true },
      { abrev: "BD", regex: /(bilirrubina direta|bd)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: true },
      { abrev: "BI", regex: /(bilirrubina indireta|bi)\D{0,25}(\d{1,3}(?:[.,]\d+)?)/i, decimal: true },

      { abrev: "TGO", regex: /(tgo|ast|transaminase oxalac[eé]tica)\D{0,35}(\d{1,5}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "TGP", regex: /(tgp|alt|transaminase pir[uú]vica)\D{0,35}(\d{1,5}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "FAL", regex: /(fosfatase alcalina|fal)\D{0,35}(\d{1,5}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "GGT", regex: /(gama gt|gama glutamil transferase|ggt|gamma gt)\D{0,35}(\d{1,5}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "DHL", regex: /(desidrogenase l[aá]tica|dhl|ldh)\D{0,35}(\d{1,5}(?:[.,]\d+)?)/i, decimal: false },
      { abrev: "Troponina", regex: /(troponina)\D{0,35}(\d+(?:[.,]\d+)?)/i, decimal: true }
    ];

    dropzone.addEventListener("click", () => fileInput.click());

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.style.background = "#e8f0ff";
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.style.background = "#f8fbff";
    });

    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.style.background = "#f8fbff";

      const file = e.dataTransfer.files[0];
      if (file) lerPDF(file);
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) lerPDF(file);
    });

    async function lerPDF(file) {
      resultadoNormal.innerText = "Lendo PDF...";
      resultadoMaiusculo.innerText = "Lendo PDF...";

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        let textoCompleto = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const strings = content.items.map(item => item.str);
          textoCompleto += strings.join(" ") + " ";
        }

        const normal = extrairExames(textoCompleto);

        if (!normal) {
          resultadoNormal.innerText = "Não encontrei os exames configurados.";
          resultadoMaiusculo.innerText = "Não encontrei os exames configurados.";
          return;
        }

        resultadoNormal.innerText = normal;
        resultadoMaiusculo.innerText = normal.toUpperCase();

      } catch (error) {
        resultadoNormal.innerText = "Erro ao ler o PDF.";
        resultadoMaiusculo.innerText = "Erro ao ler o PDF.";
        console.error(error);
      }
    }

    function extrairExames(texto) {
      texto = texto.replace(/\s+/g, " ");

      let resultados = [];

      exames.forEach(exame => {
        const match = texto.match(exame.regex);

        if (match) {
          let valor = match[2];

          valor = valor.replace(",", ".");
          valor = valor.replace(/\.(?=\d{3}$)/, "");

          if (exame.decimal) {
            valor = parseFloat(valor).toFixed(1);
          } else {
            valor = String(parseInt(valor));
          }

          resultados.push(`${exame.abrev}: ${valor};`);
        }
      });

      return resultados.join(" ");
    }

    function copiarTexto(tipo) {
      const texto = tipo === "normal"
        ? resultadoNormal.innerText
        : resultadoMaiusculo.innerText;

      navigator.clipboard.writeText(texto);
      alert("Resultado copiado!");
    }
  </script>
</body>
</html>
